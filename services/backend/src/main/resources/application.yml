spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:services/backend/.env[.properties]
  application:
    name: smartkash-backend
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

smartkash:
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    client-email: ${FIREBASE_CLIENT_EMAIL:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
    private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
    client-id: ${FIREBASE_CLIENT_ID:}
  profile-images:
    storage-directory: ${PROFILE_IMAGE_STORAGE_DIR:src/main/resources/profile-images}
