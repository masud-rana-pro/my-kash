spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:services/backend/.env[.properties]
  application:
    name: smartkash-backend
  profiles:
    default: local

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

smartkash:
  firebase:
    private-key-id: ${FIREBASE_PRIVATE_KEY_ID:}
    client-id: ${FIREBASE_CLIENT_ID:}
