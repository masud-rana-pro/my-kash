smartkash:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-local-env}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    client-email: ${FIREBASE_CLIENT_EMAIL:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
  fcm:
    enabled: ${FCM_ENABLED:false}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smartkash_db}
    username: ${DATABASE_USERNAME:smartkash_admin}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
